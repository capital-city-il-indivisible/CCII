backend:
  name: github
  repo: valorieb/CCII
  branch: main
  auth_scope: "repo"

media_folder: "images/cms"     
public_folder: "/images/cms" 

collections:
  - name: "events"
    label: "Events"
    folder: "content/events"   # Markdown files for events
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }

  - name: "news"
    label: "News / Blog"
    folder: "content/news"      # Markdown files for news/blog posts
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Image", name: "image", widget: "image" }
